<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TorisApp</title>
    <link rel="icon" href="https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/cube-transparent.svg">
    <link rel="stylesheet" href="css/shared.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- SCREEN: LOGIN -->
<div id="screen-login" class="screen">
    <div class="login-card">
        <div class="login-logo"><i data-icon="cube-transparent" data-size="48"></i></div>
        <h1>TorisApp</h1>
        <p>Compartí gastos, listas y tareas sin drama</p>
        <button class="btn-google" onclick="iniciarSesion()">
            <svg width="18" height="18" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Continuar con Google
        </button>
    </div>
</div>

<!-- TOPBAR -->
<div id="topbar" class="topbar hidden">
    <div class="topbar-left">
        <h1><i data-icon="cube-transparent" data-size="20"></i> Mi Espacio</h1>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
        <span id="topbar-user" class="topbar-user"></span>
        <button class="btn-icon" onclick="cerrarSesion()" title="Cerrar sesión"><i data-icon="arrow-right-on-rectangle" data-size="18"></i></button>
    </div>
</div>

<!-- SCREEN: DASHBOARD -->
<div id="screen-dashboard" class="screen">
    <div class="container">
        <div class="card card-click" onclick="location.href='gastos.html'">
            <div class="card-body dash-card">
                <div class="dash-icon"><i data-icon="currency-dollar" data-size="28"></i></div>
                <div>
                    <div class="dash-title">Gastos</div>
                    <div class="dash-sub">Grupos, divisiones y balances</div>
                </div>
                <div class="dash-arrow">›</div>
            </div>
        </div>
        <div class="card card-click" onclick="location.href='listas.html'">
            <div class="card-body dash-card">
                <div class="dash-icon"><i data-icon="shopping-cart" data-size="28"></i></div>
                <div>
                    <div class="dash-title">Listas</div>
                    <div class="dash-sub">Compras, viajes y lo que necesites</div>
                </div>
                <div class="dash-arrow">›</div>
            </div>
        </div>
        <div class="card card-click" onclick="location.href='tareas.html'">
            <div class="card-body dash-card">
                <div class="dash-icon"><i data-icon="check-circle" data-size="28"></i></div>
                <div>
                    <div class="dash-title">Tareas</div>
                    <div class="dash-sub">Pendientes del día a día</div>
                </div>
                <div class="dash-arrow">›</div>
            </div>
        </div>
    </div>
</div>

<script src="js/supabase-client.js"></script>
<script src="js/utils.js"></script>
<script>
    // =============================================
    // AUTH (index maneja login + dashboard)
    // =============================================
    async function iniciarSesion() {
        const { error } = await db.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: APP_BASE_URL,
                scopes: 'https://www.googleapis.com/auth/calendar.events',
                queryParams: {
                    access_type: 'offline',
                    prompt: 'consent'
                }
            }
        });
        if (error) alert('Error al iniciar sesión: ' + error.message);
    }

    async function cerrarSesion() {
        await db.auth.signOut();
    }

    db.auth.onAuthStateChange((event, session) => {
        if (session) {
            activarApp(session.user);
            if (event === 'SIGNED_IN' && session.provider_refresh_token) {
                guardarTokenGoogle(session.user.id, session.provider_refresh_token);
            }
        } else {
            mostrarPantalla('login');
            document.getElementById('topbar').classList.add('hidden');
        }
    });

    async function guardarTokenGoogle(userId, refreshToken) {
        const { error } = await db.from('google_tokens').upsert({
            user_id: userId,
            refresh_token: refreshToken,
            updated_at: new Date().toISOString()
        });
        if (error) console.error('No se pudo guardar el token de Google Calendar:', error.message);
    }

    function activarApp(user) {
        document.getElementById('topbar').classList.remove('hidden');
        const nombre = (user.user_metadata?.full_name || user.email || '').split(' ')[0];
        document.getElementById('topbar-user').textContent = nombre;

        // Si viene de un link de invitación a un grupo puntual, lo mandamos directo ahí
        const params = new URLSearchParams(window.location.search);
        const inviteGasto = params.get('invite_gasto');
        const inviteTarea = params.get('invite_tarea');
        if (inviteGasto) {
            window.location.href = `gastos.html?abrir=${inviteGasto}`;
            return;
        }
        if (inviteTarea) {
            window.location.href = `tareas.html?abrir=${inviteTarea}`;
            return;
        }

        mostrarPantalla('dashboard');
    }

    function mostrarPantalla(nombre) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + nombre).classList.add('active');
    }

    // Chequear sesión inicial
    db.auth.getSession().then(({ data: { session } }) => {
        if (session) activarApp(session.user);
        else mostrarPantalla('login');
    });
</script>
</body>
</html>
