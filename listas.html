<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TorisApp • Listas</title>
    <link rel="icon" href="https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/cube-transparent.svg">
    <link rel="stylesheet" href="css/shared.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="topbar-left">
        <button id="btn-back" class="btn-icon" onclick="volverAListas()"><i data-icon="arrow-left" data-size="18"></i></button>
        <h1 id="topbar-title"><i data-icon="shopping-cart" data-size="20"></i> Listas</h1>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
        <span id="topbar-user" class="topbar-user"></span>
        <button class="btn-icon" onclick="cerrarSesion()" title="Cerrar sesión"><i data-icon="arrow-right-on-rectangle" data-size="18"></i></button>
    </div>
</div>

<!-- SCREEN: LISTA DE LISTAS -->
<div id="screen-listas" class="screen active">
    <div class="container">
        <div id="lista-de-listas"><div class="loader">Cargando listas...</div></div>
        <button class="btn btn-primary btn-full mt-16" onclick="abrirModalLista()"><i data-icon="plus" data-size="16"></i> Nueva Lista</button>
    </div>
</div>

<!-- SCREEN: DETALLE DE LISTA -->
<div id="screen-detalle" class="screen">
    <div class="container">
        <div class="filter-tabs" id="lista-filters">
            <div class="filter-tab active" onclick="setFiltro('pendientes')">Pendientes</div>
            <div class="filter-tab" onclick="setFiltro('todos')">Todos</div>
            <div class="filter-tab" onclick="setFiltro('comprados')">Comprados</div>
        </div>
        <div id="lista-stats" class="stats-row"></div>
        <div id="lista-items" class="card"></div>

        <div class="add-item-form mt-12">
            <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">Agregar ítem</div>
            <div class="form-group" style="margin-bottom:8px">
                <input type="text" id="lista-input-nombre" placeholder="Ej: Leche, Fideos, Jabón..." class="input-sm"
                    onkeydown="if(event.key==='Enter') agregarItem()" />
            </div>
            <div class="add-item-row">
                <input type="number" id="lista-input-cantidad" placeholder="Cant." class="input-sm" style="width:80px" min="0" step="0.5" />
                <select id="lista-input-unidad" class="input-sm" style="flex:1">
                    <option value="">sin unidad</option>
                    <option value="kg">kg</option>
                    <option value="g">g</option>
                    <option value="L">L</option>
                    <option value="ml">ml</option>
                    <option value="u">u (unidades)</option>
                    <option value="paq">paq</option>
                    <option value="doc">docena</option>
                </select>
                <button class="btn btn-primary" onclick="agregarItem()" style="white-space:nowrap"><i data-icon="plus" data-size="16"></i> Agregar</button>
            </div>
        </div>

        <button class="btn btn-ghost btn-full mt-12" id="btn-borrar-comprados" onclick="borrarComprados()" style="display:none;color:var(--danger);border-color:var(--danger)">
            <i data-icon="trash" data-size="16"></i> Borrar todos los comprados
        </button>
    </div>
</div>

<!-- MODAL: NUEVA LISTA -->
<div id="modal-lista" class="modal-overlay">
    <div class="modal">
        <div class="modal-header">
            <h3>Nueva Lista</h3>
            <button class="modal-close" onclick="cerrarModal('modal-lista')"><i data-icon="x-mark" data-size="14"></i></button>
        </div>
        <div class="form-group">
            <label>Nombre de la lista</label>
            <input type="text" id="input-nombre-lista" placeholder="Ej: Supermercado, Viaje a Bariloche..." />
        </div>
        <button class="btn btn-primary btn-full" onclick="crearLista()">Crear Lista</button>
    </div>
</div>

<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script>
// =============================================
// ESTADO GLOBAL
// =============================================
let listaActual = null;
let filtroLista = 'pendientes';
let todosLosItems = [];

requireAuth(async () => {
    const params = new URLSearchParams(window.location.search);
    const abrirId = params.get('abrir');
    if (abrirId) {
        await abrirListaPorId(parseInt(abrirId, 10), { filtro: params.get('filtro') });
    } else {
        await cargarListas();
    }
});

const FILTROS_LISTA = ['pendientes', 'todos', 'comprados'];

async function abrirListaPorId(id, opts = {}) {
    const { data, error } = await db.from('listas').select('*').eq('id', id).single();
    if (error || !data) {
        alert('No se encontró esa lista.');
        clearDetailQueryParams();
        await cargarListas();
        mostrarPantalla('listas');
        return;
    }
    await abrirLista(data, opts);
}

// =============================================
// NAVEGACIÓN
// =============================================
function mostrarPantalla(nombre) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + nombre).classList.add('active');
}

function volverAListas() {
    if (!listaActual) { irAlInicio(); return; }
    listaActual = null;
    clearDetailQueryParams();
    document.getElementById('topbar-title').innerHTML = '<i data-icon="shopping-cart" data-size="20"></i> Listas';
    mostrarPantalla('listas');
    cargarListas();
}

function abrirModal(id) { document.getElementById(id).classList.add('open'); }
function cerrarModal(id) { document.getElementById(id).classList.remove('open'); }

// =============================================
// LISTA DE LISTAS (las "carpetas": Supermercado, Viaje, etc.)
// =============================================
async function cargarListas() {
    const cont = document.getElementById('lista-de-listas');
    cont.innerHTML = '<div class="loader">Cargando listas...</div>';
    const { data, error } = await db.from('listas').select('*').order('created_at', { ascending: false });
    if (error) { cont.innerHTML = `<div class="alert alert-error">Error: ${error.message}<br>¿Ejecutaste el SQL de configuración? Ver README.</div>`; return; }
    if (!data?.length) {
        cont.innerHTML = `<div class="empty"><span class="empty-icon"><i data-icon="shopping-cart" data-size="40"></i></span>Sin listas todavía.<br>Creá una para empezar.</div>`;
        return;
    }
    cont.innerHTML = data.map(l => `
        <div class="card" style="overflow:visible">
            <div class="card-body flex-between" style="gap:10px">
                <div class="card-click" style="flex:1;min-width:0" onclick='abrirLista(${JSON.stringify(l)})'>
                    <div style="font-weight:700;font-size:16px">${escapeHtml(l.nombre)}</div>
                    <div class="text-muted">${new Date(l.created_at).toLocaleDateString('es-AR', { day:'2-digit', month:'short', year:'numeric' })}</div>
                </div>
                    <button class="btn btn-danger btn-sm" onclick="eliminarLista(${l.id}, '${l.nombre.replace(/'/g,"\\'")}')"><i data-icon="trash" data-size="16"></i></button>
            </div>
        </div>
    `).join('');
}

function abrirModalLista() {
    document.getElementById('input-nombre-lista').value = '';
    abrirModal('modal-lista');
    setTimeout(() => document.getElementById('input-nombre-lista').focus(), 100);
}

async function crearLista() {
    const nombre = document.getElementById('input-nombre-lista').value.trim();
    if (!nombre) { alert('Ingresá un nombre.'); return; }
    const { error } = await db.from('listas').insert({ nombre });
    if (error) { alert('Error: ' + error.message); return; }
    cerrarModal('modal-lista');
    cargarListas();
}

async function eliminarLista(id, nombre) {
    if (!confirm(`¿Eliminar la lista "${nombre}"?\nSe borrarán todos sus ítems.`)) return;
    const { error: ei } = await db.from('lista_compras').delete().eq('id_lista', id);
    if (ei) { alert('Error al borrar ítems: ' + ei.message); return; }
    const { error: el } = await db.from('listas').delete().eq('id', id);
    if (el) { alert('Error al borrar lista: ' + el.message); return; }
    cargarListas();
}

async function abrirLista(lista, opts = {}) {
    listaActual = lista;
    setQueryParam('abrir', lista.id);
    document.getElementById('topbar-title').textContent = lista.nombre;
    mostrarPantalla('detalle');
    await cargarItems();
    setFiltro(FILTROS_LISTA.includes(opts.filtro) ? opts.filtro : 'pendientes');
}

// =============================================
// ÍTEMS DE LA LISTA ACTUAL
// =============================================
function setFiltro(f) {
    filtroLista = f;
    document.querySelectorAll('.filter-tab').forEach((t, i) => {
        t.classList.toggle('active', ['pendientes','todos','comprados'][i] === f);
    });
    if (listaActual) setQueryParam('filtro', f);
    renderItems();
}

async function cargarItems() {
    const cont = document.getElementById('lista-items');
    cont.innerHTML = '<div class="loader">Cargando...</div>';
    const { data, error } = await db.from('lista_compras')
        .select('*').eq('id_lista', listaActual.id).order('comprado').order('created_at');
    if (error) { cont.innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }
    todosLosItems = data || [];
    renderItems();
}

function renderItems() {
    const cont = document.getElementById('lista-items');
    const pendientes = todosLosItems.filter(i => !i.comprado);
    const comprados  = todosLosItems.filter(i => i.comprado);

    let items;
    if (filtroLista === 'pendientes') items = pendientes;
    else if (filtroLista === 'comprados') items = comprados;
    else items = [...pendientes, ...comprados];

    document.getElementById('lista-stats').innerHTML =
        `<span>${pendientes.length} pendiente${pendientes.length !== 1 ? 's' : ''}</span>
         <span>${comprados.length} comprado${comprados.length !== 1 ? 's' : ''}</span>`;

    document.getElementById('btn-borrar-comprados').style.display =
        comprados.length > 0 ? 'flex' : 'none';

    if (!items.length) {
        const msgs = { pendientes: '<i data-icon="check-circle" data-size="18"></i> No hay ítems pendientes.', comprados: 'Sin ítems comprados todavía.', todos: '<i data-icon="clipboard-document-list" data-size="18"></i> La lista está vacía. Agregá algo.' };
        cont.innerHTML = `<div class="empty" style="padding:24px"><span class="empty-icon">${filtroLista === 'pendientes' ? icon('check-circle',40) : icon('shopping-cart',40)}</span>${msgs[filtroLista]}</div>`;
        return;
    }

    cont.innerHTML = items.map(item => {
        const cantStr = item.cantidad ? `${item.cantidad}${item.unidad ? ' ' + item.unidad : ''}` : '';
        return `<div class="lista-item ${item.comprado ? 'comprado' : ''}" id="item-${item.id}">
            <div class="lista-check ${item.comprado ? 'checked' : ''}" onclick="toggleItem(${item.id}, ${item.comprado})">
                ${item.comprado ? icon('check',14) : ''}
            </div>
            <div class="lista-nombre ${item.comprado ? 'tachado' : ''}">${escapeHtml(item.nombre)}</div>
            ${cantStr ? `<div class="lista-cantidad">${escapeHtml(cantStr)}</div>` : ''}
            <button onclick="borrarItem(${item.id})" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:4px;flex-shrink:0"><i data-icon="x-mark" data-size="14"></i></button>
        </div>`;
    }).join('');
}

async function agregarItem() {
    const nombre   = document.getElementById('lista-input-nombre').value.trim();
    const cantidad = parseFloat(document.getElementById('lista-input-cantidad').value) || null;
    const unidad   = document.getElementById('lista-input-unidad').value || null;
    if (!nombre) { document.getElementById('lista-input-nombre').focus(); return; }

    const payload = { nombre, cantidad, unidad, id_lista: listaActual.id };
    const { data, error } = await db.from('lista_compras').insert(payload).select().single();
    if (error) { alert('Error: ' + error.message); return; }

    document.getElementById('lista-input-nombre').value = '';
    document.getElementById('lista-input-cantidad').value = '';
    document.getElementById('lista-input-unidad').value = '';
    document.getElementById('lista-input-nombre').focus();

    todosLosItems = [data, ...todosLosItems];
    todosLosItems.sort((a, b) => a.comprado - b.comprado || new Date(a.created_at) - new Date(b.created_at));
    renderItems();
}

async function toggleItem(id, estaComprado) {
    const nuevoEstado = !estaComprado;
    const { error } = await db.from('lista_compras').update({
        comprado: nuevoEstado,
        comprado_at: nuevoEstado ? new Date().toISOString() : null
    }).eq('id', id);
    if (error) { alert('Error: ' + error.message); return; }
    const item = todosLosItems.find(i => i.id === id);
    if (item) { item.comprado = nuevoEstado; item.comprado_at = nuevoEstado ? new Date().toISOString() : null; }
    renderItems();
}

async function borrarItem(id) {
    const { error } = await db.from('lista_compras').delete().eq('id', id);
    if (error) { alert('Error: ' + error.message); return; }
    todosLosItems = todosLosItems.filter(i => i.id !== id);
    renderItems();
}

async function borrarComprados() {
    if (!confirm('¿Borrar todos los ítems comprados?')) return;
    const ids = todosLosItems.filter(i => i.comprado).map(i => i.id);
    const { error } = await db.from('lista_compras').delete().in('id', ids);
    if (error) { alert('Error: ' + error.message); return; }
    todosLosItems = todosLosItems.filter(i => !i.comprado);
    renderItems();
}
</script>
</body>
</html>
