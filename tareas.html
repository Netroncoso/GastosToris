<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tareas · SplitApp ✅</title>
    <link rel="icon" href="https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/check-circle.svg">
    <link rel="stylesheet" href="css/shared.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="topbar-left">
        <button id="btn-back" class="btn-icon" onclick="volverAGrupos()"><span class="hicon" style="width:18px;height:18px;-webkit-mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/arrow-left.svg);mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/arrow-left.svg)"></span></button>
        <h1 id="topbar-title"><span class="hicon" style="width:20px;height:20px;-webkit-mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/check-circle.svg);mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/check-circle.svg)"></span> Tareas</h1>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
        <span id="topbar-user" class="topbar-user"></span>
        <button class="btn-icon" onclick="cerrarSesion()" title="Cerrar sesión"><span class="hicon" style="width:18px;height:18px;-webkit-mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/arrow-right-on-rectangle.svg);mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/arrow-right-on-rectangle.svg)"></span></button>
    </div>
</div>

<!-- SCREEN: GRUPOS DE TAREAS -->
<div id="screen-grupos" class="screen active">
    <div class="container">
        <div id="lista-grupos"><div class="loader">Cargando grupos...</div></div>
        <button class="btn btn-primary btn-full mt-16" onclick="abrirModalGrupo()"><span class="hicon" style="width:16px;height:16px;-webkit-mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/plus.svg);mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/plus.svg)"></span> Nuevo Grupo</button>
    </div>
</div>

<!-- SCREEN: GRUPO DETAIL -->
<div id="screen-grupo" class="screen">
    <div class="tabs">
        <div class="tab active" onclick="cambiarTab('tareas')"><span class="hicon" style="width:18px;height:18px;-webkit-mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/check-circle.svg);mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/check-circle.svg)"></span> Tareas</div>
        <div class="tab" onclick="cambiarTab('personas')"><span class="hicon" style="width:18px;height:18px;-webkit-mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/users.svg);mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/users.svg)"></span> Personas</div>
    </div>
    <div class="container">
        <div id="tab-tareas" class="tab-content active">
            <div class="filter-tabs">
                <div class="filter-tab active" onclick="setFiltro('pendientes')">Pendientes</div>
                <div class="filter-tab" onclick="setFiltro('todas')">Todas</div>
                <div class="filter-tab" onclick="setFiltro('hechas')">Hechas</div>
            </div>
            <div id="tareas-stats" class="stats-row"></div>
            <div id="tareas-items" class="card"></div>

            <div class="add-item-form mt-12">
                <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">Nueva tarea</div>
                <div class="form-group" style="margin-bottom:8px">
                    <input type="text" id="input-titulo-tarea" placeholder="Ej: Pagar el alquiler" class="input-sm"
                        onkeydown="if(event.key==='Enter') agregarTarea()" />
                </div>
                <div class="add-item-row" style="margin-bottom:8px">
                    <select id="input-prioridad-tarea" class="input-sm" style="flex:1">
                        <option value="baja">Baja</option>
                        <option value="media" selected>Media</option>
                        <option value="alta">Alta</option>
                    </select>
                    <select id="input-asignado-tarea" class="input-sm" style="flex:1">
                        <option value="">Sin asignar</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom:8px">
                    <label style="margin-bottom:4px">Vencimiento (opcional — la agrega a Google Calendar)</label>
                    <input type="datetime-local" id="input-fecha-tarea" class="input-sm" />
                </div>
                <div class="form-group" style="margin-bottom:0">
                    <label style="margin-bottom:4px">Vincular con una lista (opcional)</label>
                    <select id="input-lista-tarea" class="input-sm">
                        <option value="">Ninguna</option>
                    </select>
                </div>
                <button class="btn btn-primary btn-full mt-12" onclick="agregarTarea()"><span class="hicon" style="width:16px;height:16px;-webkit-mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/plus.svg);mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/plus.svg)"></span> Agregar tarea</button>
            </div>

            <button class="btn btn-ghost btn-full mt-12" id="btn-borrar-hechas" onclick="borrarHechas()" style="display:none;color:var(--danger);border-color:var(--danger)">
                <span class="hicon" style="width:16px;height:16px;-webkit-mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/trash.svg);mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/trash.svg)"></span> Borrar todas las hechas
            </button>
        </div>

        <div id="tab-personas" class="tab-content">
            <div id="lista-personas-tareas"><div class="loader">Cargando...</div></div>
            <div class="form-group mt-16">
                <label>Nombre</label>
                <input type="text" id="input-nueva-persona" placeholder="Ej: Martín"
                    onkeydown="if(event.key==='Enter') agregarPersonaTarea()" />
            </div>
            <div class="form-group">
                <label>Email (opcional — para invitarla)</label>
                <input type="email" id="input-email-persona" placeholder="martin@email.com" />
            </div>
            <div id="invite-info-tareas" class="alert alert-info" style="display:none">
                <span class="hicon" style="width:16px;height:16px;-webkit-mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/envelope.svg);mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/envelope.svg)"></span> Se le enviará un link al correo para que pueda ingresar a la app y ver las tareas de este grupo.
            </div>
            <button class="btn btn-primary btn-full" onclick="agregarPersonaTarea()">Agregar Persona</button>
        </div>
    </div>
</div>

<!-- MODAL: NUEVO GRUPO -->
<div id="modal-grupo" class="modal-overlay">
    <div class="modal">
        <div class="modal-header">
            <h3>Nuevo Grupo de Tareas</h3>
            <button class="modal-close" onclick="cerrarModal('modal-grupo')"><span class="hicon" style="width:14px;height:14px;-webkit-mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/x-mark.svg);mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/x-mark.svg)"></span></button>
        </div>
        <div class="form-group">
            <label>Nombre del grupo</label>
            <input type="text" id="input-nombre-grupo" placeholder="Ej: Casa, Oficina..." />
        </div>
        <button class="btn btn-primary btn-full" onclick="crearGrupo()">Crear Grupo</button>
    </div>
</div>

<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script>
// =============================================
// ESTADO GLOBAL
// =============================================
let grupoActual = null;
let personasTareas = [];
let grupoEditando = null;
let filtroTareas = 'pendientes';
let todasLasTareas = [];
let listasDisponibles = [];
const PRIO_LABEL = { alta: 'Alta', media: 'Media', baja: 'Baja' };

requireAuth(async () => {
    await syncInvitadosTareas();
    await cargarGrupos();
    await cargarListasDisponibles();
});

// =============================================
// SINCRONIZACIÓN DE INVITADOS
async function syncInvitadosTareas() {
    const user = await getCurrentUser();
    if (!user?.email || !user.id) return;

    const { data, error } = await db.from('personas_tareas')
        .select('id_grupo_tareas')
        .eq('email', user.email);
    if (error) return;

    const grupos = [...new Set((data || []).map(p => p.id_grupo_tareas))];
    for (const id_grupo_tareas of grupos) {
        const { error: em } = await db.from('grupos_tareas_miembros')
            .upsert({ id_grupo_tareas, user_id: user.id }, { onConflict: ['id_grupo_tareas', 'user_id'] });
        if (em && !em.message?.includes('duplicate')) {
            console.warn('No se pudo sincronizar membresía invitada tareas:', em.message);
        }
    }
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('input-email-persona').addEventListener('input', function() {
        const tieneEmail = this.value.trim().length > 0;
        document.getElementById('invite-info-tareas').style.display = tieneEmail ? 'block' : 'none';
        document.querySelector('#tab-personas .btn-primary').textContent =
            tieneEmail ? 'Agregar y Enviar Invitación' : 'Agregar Persona';
    });
});

// =============================================
// NAVEGACIÓN
// =============================================
function mostrarPantalla(nombre) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + nombre).classList.add('active');
}

function cambiarTab(nombre) {
    const tabs = ['tareas', 'personas'];
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', tabs[i] === nombre));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + nombre).classList.add('active');
}

function abrirGrupo(grupo) {
    grupoActual = grupo;
    document.getElementById('topbar-title').textContent = grupo.nombre;
    document.getElementById('input-nueva-persona').value = '';
    document.getElementById('input-email-persona').value = '';
    document.getElementById('invite-info-tareas').style.display = 'none';
    document.querySelector('#tab-personas .btn-primary').textContent = 'Agregar Persona';
    mostrarPantalla('grupo');
    cambiarTab('tareas');
    cargarPersonasTareas().then(cargarTareas);
}

function volverAGrupos() {
    if (!grupoActual) { irAlInicio(); return; }
    grupoActual = null;
    personasTareas = [];
    document.getElementById('topbar-title').innerHTML = '<span class="hicon" style="width:20px;height:20px;-webkit-mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/check-circle.svg);mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/check-circle.svg)"></span> Tareas';
    mostrarPantalla('grupos');
    cargarGrupos();
}

function abrirModal(id) { document.getElementById(id).classList.add('open'); }
function cerrarModal(id) { document.getElementById(id).classList.remove('open'); }

function abrirModalGrupo(grupo = null) {
    grupoEditando = grupo;
    document.getElementById('input-nombre-grupo').value = grupo ? grupo.nombre : '';
    document.querySelector('#modal-grupo .modal-header h3').textContent = grupo ? 'Editar Grupo de Tareas' : 'Nuevo Grupo de Tareas';
    document.querySelector('#modal-grupo .btn-primary').textContent = grupo ? 'Actualizar Grupo' : 'Crear Grupo';
    abrirModal('modal-grupo');
    setTimeout(() => document.getElementById('input-nombre-grupo').focus(), 100);
}

async function editarGrupo(id) {
    const grupo = await db.from('grupos_tareas').select('*').eq('id', id).single();
    if (grupo.error) { alert('Error: ' + grupo.error.message); return; }
    abrirModalGrupo(grupo.data);
}

// =============================================
// GRUPOS DE TAREAS (propios, independientes de los grupos de Gastos)
// =============================================
async function cargarGrupos() {
    const cont = document.getElementById('lista-grupos');
    cont.innerHTML = '<div class="loader">Cargando grupos...</div>';
    const { data, error } = await db.from('grupos_tareas').select('*').order('created_at', { ascending: false });
    if (error) { cont.innerHTML = `<div class="alert alert-error">Error: ${error.message}<br>¿Ejecutaste el SQL de configuración? Ver README.</div>`; return; }
    if (!data?.length) {
        cont.innerHTML = `<div class="empty"><span class="empty-icon"><span class="hicon" style="width:40px;height:40px;-webkit-mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/check-circle.svg);mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/check-circle.svg)"></span></span>Sin grupos todavía.<br>Creá uno para empezar (ej: "Casa", "Oficina").</div>`;
        return;
    }
    cont.innerHTML = data.map(g => `
        <div class="card" style="overflow:visible">
            <div class="card-body flex-between" style="gap:10px">
                <div class="card-click" style="flex:1;min-width:0" onclick='abrirGrupo(${JSON.stringify(g)})'>
                    <div style="font-weight:700;font-size:16px">${escapeHtml(g.nombre)}</div>
                    <div class="text-muted">${new Date(g.created_at).toLocaleDateString('es-AR', { day:'2-digit', month:'short', year:'numeric' })}</div>
                </div>
                <div style="display:flex;gap:8px;align-items:center">
                    <button class="btn btn-ghost btn-sm" onclick="editarGrupo(${g.id})" title="Editar grupo">${icon('pencil-square',16)}</button>
                    <button class="btn btn-danger btn-sm" onclick="eliminarGrupo(${g.id}, '${g.nombre.replace(/'/g,"\\'")}')" title="Eliminar grupo">${icon('trash',16)}</button>
                </div>
            </div>
        </div>
    `).join('');
}

async function crearGrupo() {
    const nombre = document.getElementById('input-nombre-grupo').value.trim();
    if (!nombre) { alert('Ingresá un nombre.'); return; }
    const userId = await getCurrentUserId();
    if (!userId) { alert('No se encontró el usuario actual. Volvé a iniciar sesión.'); return; }

    if (grupoEditando) {
        const { error } = await db.from('grupos_tareas').update({ nombre }).eq('id', grupoEditando.id);
        if (error) { alert('Error al actualizar grupo: ' + error.message); return; }
        grupoEditando = null;
        cerrarModal('modal-grupo');
        cargarGrupos();
        return;
    }

    const { data, error } = await db.from('grupos_tareas').insert({ nombre }).select().single();
    if (error) { alert('Error: ' + error.message); return; }

    const { error: em } = await db.from('grupos_tareas_miembros')
        .upsert({ id_grupo_tareas: data.id, user_id: userId }, { onConflict: ['id_grupo_tareas', 'user_id'] });
    if (em) { alert('Grupo creado, pero no se pudo guardar la membresía: ' + em.message); }

    const user = await getCurrentUser();
    if (user?.email) {
        const { error: ep } = await db.from('personas_tareas').insert({
            id_grupo_tareas: data.id,
            nombre: getDisplayNameFromUser(user),
            email: user.email
        });
        if (ep) {
            console.warn('No se pudo agregar al creador como persona en tareas:', ep.message);
        }
    }

    cerrarModal('modal-grupo');
    cargarGrupos();
}

async function eliminarGrupo(id, nombre) {
    if (!confirm(`¿Eliminar el grupo "${nombre}"?\nSe borrarán sus tareas y personas.`)) return;
    const { error: et } = await db.from('tareas').delete().eq('id_grupo_tareas', id);
    if (et) { alert('Error al borrar tareas: ' + et.message); return; }
    const { error: ep } = await db.from('personas_tareas').delete().eq('id_grupo_tareas', id);
    if (ep) { alert('Error al borrar personas: ' + ep.message); return; }
    const { error: eg } = await db.from('grupos_tareas').delete().eq('id', id);
    if (eg) { alert('Error al borrar grupo: ' + eg.message); return; }
    cargarGrupos();
}

// =============================================
// PERSONAS DEL GRUPO DE TAREAS (propias, no comparten con Gastos)
// =============================================
async function cargarPersonasTareas() {
    const { data, error } = await db.from('personas_tareas')
        .select('*').eq('id_grupo_tareas', grupoActual.id).order('nombre');
    personasTareas = data || [];
    const cont = document.getElementById('lista-personas-tareas');
    if (error) { cont.innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }
    if (!data?.length) {
        cont.innerHTML = `<div class="empty"><span class="empty-icon"><span class="hicon" style="width:40px;height:40px;-webkit-mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/users.svg);mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/users.svg)"></span></span>Sin personas todavía en este grupo.</div>`;
    } else {
        cont.innerHTML = `<div class="card">${data.map(p => `
            <div class="part-item">
                <div class="avatar">${p.nombre.charAt(0).toUpperCase()}</div>
                <div style="flex:1;min-width:0">
                    <div class="part-name">${escapeHtml(p.nombre)}</div>
                    ${p.email ? `<div class="text-muted" style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><span class="hicon" style="width:14px;height:14px;-webkit-mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/envelope.svg);mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/envelope.svg)"></span> ${escapeHtml(p.email)}</div>` : ''}
                </div>
                ${p.email ? '<span class="badge badge-green" style="font-size:11px">Invitado</span>' : ''}
                <button onclick="borrarPersonaTarea(${p.id})" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:4px"><span class="hicon" style="width:14px;height:14px;-webkit-mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/x-mark.svg);mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/x-mark.svg)"></span></button>
            </div>
        `).join('')}</div>`;
    }
    renderSelectAsignado();
}

function renderSelectAsignado() {
    const sel = document.getElementById('input-asignado-tarea');
    const actual = sel.value;
    sel.innerHTML = '<option value="">Sin asignar</option>' +
        personasTareas.map(p => `<option value="${p.id}">${escapeHtml(p.nombre)}</option>`).join('');
    sel.value = actual;
}

async function agregarPersonaTarea() {
    const nombre = document.getElementById('input-nueva-persona').value.trim();
    const email  = document.getElementById('input-email-persona').value.trim().toLowerCase();
    if (!nombre) { alert('Ingresá un nombre.'); return; }

    const nombreDup = personasTareas.find(p => p.nombre.toLowerCase() === nombre.toLowerCase());
    if (nombreDup) { alert(`Ya existe "${nombre}" en este grupo.`); return; }
    if (email) {
        const emailDup = personasTareas.find(p => p.email?.toLowerCase() === email);
        if (emailDup) { alert(`El email ${email} ya está registrado en este grupo (${emailDup.nombre}).`); return; }
    }

    const payload = { nombre, id_grupo_tareas: grupoActual.id };
    if (email) payload.email = email;

    const { error } = await db.from('personas_tareas').insert(payload);
    if (error) { alert('Error: ' + error.message); return; }

    if (email) {
        const { error: inviteError } = await db.auth.signInWithOtp({
            email,
            options: { emailRedirectTo: APP_BASE_URL, shouldCreateUser: true }
        });
        if (inviteError) {
            alert(`${nombre} fue agregado, pero hubo un error al enviar la invitación: ${inviteError.message}`);
        } else {
            alert(`✅ ${nombre} fue agregado y se le envió una invitación a ${email}.`);
        }
    }

    document.getElementById('input-nueva-persona').value = '';
    document.getElementById('input-email-persona').value = '';
    document.getElementById('invite-info-tareas').style.display = 'none';
    document.querySelector('#tab-personas .btn-primary').textContent = 'Agregar Persona';
    document.getElementById('input-nueva-persona').focus();
    cargarPersonasTareas();
}

async function borrarPersonaTarea(id) {
    if (!confirm('¿Eliminar esta persona? Las tareas asignadas quedarán sin asignar.')) return;
    const { error } = await db.from('personas_tareas').delete().eq('id', id);
    if (error) { alert('Error: ' + error.message); return; }
    cargarPersonasTareas();
    cargarTareas();
}

// =============================================
// LISTAS DISPONIBLES (globales, para vincular una tarea con una lista de compras)
// =============================================
async function cargarListasDisponibles() {
    const { data, error } = await db.from('listas').select('*').order('nombre');
    if (error) { console.error(error); return; }
    listasDisponibles = data || [];
    const sel = document.getElementById('input-lista-tarea');
    if (!sel) return;
    const actual = sel.value;
    sel.innerHTML = '<option value="">Ninguna</option>' +
        listasDisponibles.map(l => `<option value="${l.id}">${escapeHtml(l.nombre)}</option>`).join('');
    sel.value = actual;
}

function nombreLista(id) {
    if (!id) return null;
    return listasDisponibles.find(l => l.id === id)?.nombre || null;
}

// =============================================
// TAREAS (escopeadas al grupo de tareas actual)
// =============================================
function setFiltro(f) {
    filtroTareas = f;
    document.querySelectorAll('.filter-tab').forEach((t, i) => {
        t.classList.toggle('active', ['pendientes','todas','hechas'][i] === f);
    });
    renderTareas();
}

async function cargarTareas() {
    const cont = document.getElementById('tareas-items');
    cont.innerHTML = '<div class="loader">Cargando tareas...</div>';
    const { data, error } = await db.from('tareas')
        .select('*').eq('id_grupo_tareas', grupoActual.id)
        .order('hecha').order('created_at', { ascending: false });
    if (error) { cont.innerHTML = `<div class="alert alert-error">Error: ${error.message}<br>¿Ejecutaste el SQL de configuración? Ver README.</div>`; return; }
    todasLasTareas = data || [];
    renderTareas();
}

function nombreAsignado(id) {
    if (!id) return null;
    return personasTareas.find(p => p.id === id)?.nombre || null;
}

function renderTareas() {
    const cont = document.getElementById('tareas-items');
    const pendientes = todasLasTareas.filter(t => !t.hecha);
    const hechas     = todasLasTareas.filter(t => t.hecha);

    let items;
    if (filtroTareas === 'pendientes') items = pendientes;
    else if (filtroTareas === 'hechas') items = hechas;
    else items = [...pendientes, ...hechas];

    document.getElementById('tareas-stats').innerHTML =
        `<span>${pendientes.length} pendiente${pendientes.length !== 1 ? 's' : ''}</span>
         <span>${hechas.length} hecha${hechas.length !== 1 ? 's' : ''}</span>`;

    document.getElementById('btn-borrar-hechas').style.display =
        hechas.length > 0 ? 'flex' : 'none';

    if (!items.length) {
        const msgs = { pendientes: '<span class="hicon" style="width:18px;height:18px;-webkit-mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/check-circle.svg);mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/check-circle.svg)"></span> No hay tareas pendientes.', hechas: 'Sin tareas hechas todavía.', todas: '<span class="hicon" style="width:18px;height:18px;-webkit-mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/clipboard-document-list.svg);mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/clipboard-document-list.svg)"></span> No hay tareas en este grupo. Agregá una.' };
        cont.innerHTML = `<div class="empty" style="padding:24px"><span class="empty-icon">${filtroTareas === 'pendientes' ? icon('check-circle',40) : icon('clipboard-document-list',40)}</span>${msgs[filtroTareas]}</div>`;
        return;
    }

    cont.innerHTML = items.map(t => {
        const asignado = nombreAsignado(t.id_asignado);
        const lista = nombreLista(t.id_lista);
        const tieneBadges = t.fecha_vencimiento || lista || asignado;
        return `
        <div class="tarea-item ${t.hecha ? 'comprado' : ''}" id="tarea-${t.id}">
            <div class="tarea-item-main">
                <div class="lista-check ${t.hecha ? 'checked' : ''}" onclick="toggleTarea(${t.id}, ${t.hecha})">
                    ${t.hecha ? icon('check',14) : ''}
                </div>
                <div class="prio-dot prio-${t.prioridad || 'media'}" title="Prioridad ${PRIO_LABEL[t.prioridad] || 'Media'}"></div>
                <div class="lista-nombre ${t.hecha ? 'tachado' : ''}">${escapeHtml(t.titulo)}</div>
                <button onclick="borrarTarea(${t.id})" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:4px;flex-shrink:0"><span class="hicon" style="width:14px;height:14px;-webkit-mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/x-mark.svg);mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/x-mark.svg)"></span></button>
            </div>
            ${tieneBadges ? `
            <div class="tarea-item-badges">
                ${t.fecha_vencimiento ? `<span class="badge badge-purple" title="${t.google_event_id ? 'Sincronizada con Google Calendar' : 'Vencimiento'}"><span class="hicon" style="width:14px;height:14px;-webkit-mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/calendar-days.svg);mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/calendar-days.svg)"></span> ${formatFechaHora(t.fecha_vencimiento)}</span>` : ''}
                ${lista ? `<a href="listas.html?abrir=${t.id_lista}" class="badge badge-green" style="text-decoration:none"><span class="hicon" style="width:14px;height:14px;-webkit-mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/shopping-cart.svg);mask-image:url(https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/shopping-cart.svg)"></span> ${escapeHtml(lista)}</a>` : ''}
                ${asignado ? `<span class="badge badge-blue">${escapeHtml(asignado)}</span>` : ''}
            </div>` : ''}
        </div>`;
    }).join('');
}

async function agregarTarea() {
    const titulo = document.getElementById('input-titulo-tarea').value.trim();
    const prioridad = document.getElementById('input-prioridad-tarea').value;
    const asignadoVal = document.getElementById('input-asignado-tarea').value;
    const listaVal = document.getElementById('input-lista-tarea').value;
    const fechaVal = document.getElementById('input-fecha-tarea').value; // "YYYY-MM-DDTHH:mm" en hora local, o ""
    const id_asignado = asignadoVal ? parseInt(asignadoVal) : null;
    const id_lista = listaVal ? parseInt(listaVal) : null;
    const fecha_vencimiento = fechaVal ? new Date(fechaVal).toISOString() : null;
    if (!titulo) { document.getElementById('input-titulo-tarea').focus(); return; }

    const { data, error } = await db.from('tareas')
        .insert({ titulo, prioridad, id_asignado, id_lista, id_grupo_tareas: grupoActual.id, fecha_vencimiento }).select().single();
    if (error) { alert('Error: ' + error.message); return; }

    document.getElementById('input-titulo-tarea').value = '';
    document.getElementById('input-fecha-tarea').value = '';
    document.getElementById('input-titulo-tarea').focus();

    todasLasTareas = [data, ...todasLasTareas];
    todasLasTareas.sort((a, b) => a.hecha - b.hecha || new Date(b.created_at) - new Date(a.created_at));
    renderTareas();

    if (fecha_vencimiento) {
        try {
            const asignadoEmail = personasTareas.find(p => p.id === id_asignado)?.email || null;
            const resultado = await callCalendarSync({
                action: 'create',
                titulo,
                fecha_vencimiento,
                asignado_email: asignadoEmail
            });
            await db.from('tareas').update({ google_event_id: resultado.event_id }).eq('id', data.id);
            const t = todasLasTareas.find(x => x.id === data.id);
            if (t) t.google_event_id = resultado.event_id;
            renderTareas();
        } catch (e) {
            alert('La tarea se creó, pero no se pudo agregar a Google Calendar: ' + e.message);
        }
    }
}

async function toggleTarea(id, estaHecha) {
    const nuevoEstado = !estaHecha;
    const { error } = await db.from('tareas').update({
        hecha: nuevoEstado,
        hecha_at: nuevoEstado ? new Date().toISOString() : null
    }).eq('id', id);
    if (error) { alert('Error: ' + error.message); return; }
    const tarea = todasLasTareas.find(t => t.id === id);
    if (tarea) { tarea.hecha = nuevoEstado; tarea.hecha_at = nuevoEstado ? new Date().toISOString() : null; }
    renderTareas();
}

async function borrarTarea(id) {
    const tarea = todasLasTareas.find(t => t.id === id);
    if (tarea?.google_event_id) {
        try {
            await callCalendarSync({ action: 'delete', event_id: tarea.google_event_id });
        } catch (e) {
            console.error('No se pudo borrar el evento de Google Calendar:', e.message);
        }
    }
    const { error } = await db.from('tareas').delete().eq('id', id);
    if (error) { alert('Error: ' + error.message); return; }
    todasLasTareas = todasLasTareas.filter(t => t.id !== id);
    renderTareas();
}

async function borrarHechas() {
    if (!confirm('¿Borrar todas las tareas hechas de este grupo?')) return;
    const ids = todasLasTareas.filter(t => t.hecha).map(t => t.id);
    const { error } = await db.from('tareas').delete().in('id', ids);
    if (error) { alert('Error: ' + error.message); return; }
    todasLasTareas = todasLasTareas.filter(t => !t.hecha);
    renderTareas();
}
</script>
