<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TorisApp • Tareas</title>
    <link rel="icon" href="https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24/outline/cube-transparent.svg">
    <link rel="stylesheet" href="css/shared.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="topbar-left">
        <button id="btn-back" class="btn-icon" onclick="volverAGrupos()"><i data-icon="arrow-left" data-size="18"></i></button>
        <h1 id="topbar-title"><i data-icon="check-circle" data-size="20"></i> Tareas</h1>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
        <span id="topbar-user" class="topbar-user"></span>
        <button class="btn-icon" onclick="cerrarSesion()" title="Cerrar sesión"><i data-icon="arrow-right-on-rectangle" data-size="18"></i></button>
    </div>
</div>

<!-- SCREEN: GRUPOS DE TAREAS -->
<div id="screen-grupos" class="screen active">
    <div class="container">
        <div id="lista-grupos"><div class="loader">Cargando grupos...</div></div>
        <button class="btn btn-primary btn-full mt-16" onclick="abrirModalGrupo()"><i data-icon="plus" data-size="16"></i> Nuevo Grupo</button>
    </div>
</div>

<!-- SCREEN: GRUPO DETAIL -->
<div id="screen-grupo" class="screen">
    <div class="tabs">
        <div class="tab active" onclick="cambiarTab('tareas')"><i data-icon="check-circle" data-size="18"></i> Tareas</div>
        <div class="tab" onclick="cambiarTab('personas')"><i data-icon="users" data-size="18"></i> Personas</div>
    </div>
    <div class="container">
        <div id="tab-tareas" class="tab-content active">
            <div class="filter-tabs">
                <div class="filter-tab active" onclick="setFiltro('pendientes')">Pendientes</div>
                <div class="filter-tab" onclick="setFiltro('todas')">Todas</div>
                <div class="filter-tab" onclick="setFiltro('hechas')">Hechas</div>
            </div>
            <div id="tareas-stats" class="stats-row"></div>
            <div id="tareas-items" class="card"></div>

            <div class="add-item-form mt-12">
                <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">Nueva tarea</div>
                <div class="form-group" style="margin-bottom:8px">
                    <input type="text" id="input-titulo-tarea" placeholder="Ej: Pagar el alquiler" class="input-sm"
                        onkeydown="if(event.key==='Enter') agregarTarea()" />
                </div>
                <div class="add-item-row" style="margin-bottom:8px">
                    <select id="input-prioridad-tarea" class="input-sm" style="flex:1">
                        <option value="baja">Baja</option>
                        <option value="media" selected>Media</option>
                        <option value="alta">Alta</option>
                    </select>
                    <select id="input-asignado-tarea" class="input-sm" style="flex:1">
                        <option value="">Sin asignar</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom:8px">
                    <label style="margin-bottom:4px">Vencimiento (opcional — la agrega a Google Calendar)</label>
                    <input type="datetime-local" id="input-fecha-tarea" class="input-sm" />
                </div>
                <div id="section-calendar-invites" style="display:none; margin-bottom:8px; padding:10px; background:var(--border); border-radius:8px; opacity:0.95;">
                    <label style="margin-bottom:6px; font-size:11px; color:var(--muted)">Invitar al calendario:</label>
                    <div id="calendar-invites-list" style="display:flex; flex-direction:column; gap:6px;"></div>
                </div>
                <div class="form-group" style="margin-bottom:0">
                    <label style="margin-bottom:4px">Vincular con una lista (opcional)</label>
                    <select id="input-lista-tarea" class="input-sm">
                        <option value="">Ninguna</option>
                    </select>
                </div>
                <button class="btn btn-primary btn-full mt-12" onclick="agregarTarea()"><i data-icon="plus" data-size="16"></i> Agregar tarea</button>
            </div>

            <button class="btn btn-ghost btn-full mt-12" id="btn-borrar-hechas" onclick="borrarHechas()" style="display:none;color:var(--danger);border-color:var(--danger)">
                <i data-icon="trash" data-size="16"></i> Borrar todas las hechas
            </button>
        </div>

        <div id="tab-personas" class="tab-content">
            <div id="lista-personas-tareas"><div class="loader">Cargando...</div></div>
            <div class="form-group mt-16">
                <label>Nombre</label>
                <input type="text" id="input-nueva-persona" placeholder="Ej: Martín"
                    onkeydown="if(event.key==='Enter') agregarPersonaTarea()" />
            </div>
            <div class="form-group">
                <label>Email (opcional — para invitarla)</label>
                <input type="email" id="input-email-persona" placeholder="martin@email.com" />
            </div>
            <div id="invite-info-tareas" class="alert alert-info" style="display:none">
                <i data-icon="envelope" data-size="16"></i> Se enviará una invitación por correo para unirse a este grupo. Al aceptarla, la persona podrá acceder automáticamente a las tareas compartidas.
            </div>
            <button class="btn btn-primary btn-full" onclick="agregarPersonaTarea()">Agregar Persona</button>
        </div>
    </div>
</div>

<!-- MODAL: NUEVO GRUPO -->
<div id="modal-grupo" class="modal-overlay">
    <div class="modal">
        <div class="modal-header">
            <h3>Nuevo Grupo de Tareas</h3>
            <button class="modal-close" onclick="cerrarModal('modal-grupo')"><i data-icon="x-mark" data-size="14"></i></button>
        </div>
        <div class="form-group">
            <label>Nombre del grupo</label>
            <input type="text" id="input-nombre-grupo" placeholder="Ej: Casa, Oficina..." />
        </div>
        <button class="btn btn-primary btn-full" onclick="crearGrupo()">Crear Grupo</button>
    </div>
</div>

<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script>
// =============================================
// ESTADO GLOBAL
// =============================================
let grupoActual = null;
let personasTareas = [];
let grupoEditando = null;
let filtroTareas = 'pendientes';
let todasLasTareas = [];
let listasDisponibles = [];
let userEmail = null;
const PRIO_LABEL = { alta: 'Alta', media: 'Media', baja: 'Baja' };

requireAuth(async () => {
    const user = await getCurrentUser();
    if (user) userEmail = user.email?.toLowerCase() || null;
    const sync = syncInvitados({ personsTable: 'participantes', personGroupField: 'id_grupo', membershipTable: 'grupos_miembros', membershipGroupField: 'id_grupo', tipo: 'tareas' });
    const params = new URLSearchParams(window.location.search);
    const abrirId = params.get('abrir');
    if (abrirId) {
        await sync;
        const { data, error } = await db.from('grupos').select('*').eq('id', abrirId).eq('tipo', 'tareas').single();
        if (error || !data) {
            alert('No se encontró ese grupo (o no tenés acceso todavía).');
            clearDetailQueryParams();
            await cargarGrupos();
        } else {
            await abrirGrupo(data, { tab: params.get('tab'), filtro: params.get('filtro') });
        }
    } else {
        await Promise.all([sync, cargarGrupos()]);
    }
});

// (Sincronización de invitados movida a `js/utils.js` - use `syncInvitados(...)`)

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('input-email-persona').addEventListener('input', function() {
        const tieneEmail = this.value.trim().length > 0;
        document.getElementById('invite-info-tareas').style.display = tieneEmail ? 'block' : 'none';
        document.querySelector('#tab-personas .btn-primary').textContent =
            tieneEmail ? 'Agregar y Enviar Invitación' : 'Agregar Persona';
    });

    document.getElementById('input-fecha-tarea').addEventListener('input', actualizarSeccionCalendario);
    document.getElementById('input-fecha-tarea').addEventListener('change', actualizarSeccionCalendario);
    document.getElementById('input-asignado-tarea').addEventListener('change', actualizarCheckboxesPorAsignado);
});

// Navegación: usar las funciones compartidas en `js/utils.js` (`mostrarPantalla`, `cambiarTab`)

const TABS_TAREAS = ['tareas', 'personas'];
const FILTROS_TAREAS = ['pendientes', 'todas', 'hechas'];

async function abrirGrupo(grupo, opts = {}) {
    grupoActual = grupo;
    setQueryParam('abrir', grupo.id);
    document.getElementById('topbar-title').textContent = grupo.nombre;
    document.getElementById('input-nueva-persona').value = '';
    document.getElementById('input-email-persona').value = '';
    document.getElementById('invite-info-tareas').style.display = 'none';
    document.querySelector('#tab-personas .btn-primary').textContent = 'Agregar Persona';
    mostrarPantalla('grupo');
    await Promise.all([cargarPersonasTareas(), cargarTareas(), cargarListasDisponibles()]);
    const tab = TABS_TAREAS.includes(opts.tab) ? opts.tab : 'tareas';
    cambiarTab(tab);
    if (tab === 'tareas') {
        setFiltro(FILTROS_TAREAS.includes(opts.filtro) ? opts.filtro : 'pendientes');
    }
}

function volverAGrupos() {
    if (!grupoActual) { irAlInicio(); return; }
    grupoActual = null;
    personasTareas = [];
    clearDetailQueryParams();
    document.getElementById('topbar-title').innerHTML = '<i data-icon="check-circle" data-size="20"></i> Tareas';
    mostrarPantalla('grupos');
    cargarGrupos();
}

// abrirModal / cerrarModal: ahora vienen de `js/utils.js`

function abrirModalGrupo(grupo = null) {
    if (!window._gm_tareas) window._gm_tareas = crearGestorDeGrupos({ table: 'grupos', nameField: 'nombre', rpcCreate: 'crear_grupo_tareas' });
    window._gm_tareas.abrirModalGrupo(grupo);
}

async function editarGrupo(id) {
    if (!window._gm_tareas) window._gm_tareas = crearGestorDeGrupos({ table: 'grupos', nameField: 'nombre', rpcCreate: 'crear_grupo_tareas' });
    const { data, error } = await db.from('grupos').select('*').eq('id', id).eq('tipo', 'tareas').single();
    if (error) { alert('Error: ' + error.message); return; }
    window._gm_tareas.abrirModalGrupo(data);
}

// =============================================
// GRUPOS DE TAREAS (propios, independientes de los grupos de Gastos)
// =============================================
async function cargarGrupos() {
    const cont = document.getElementById('lista-grupos');
    cont.innerHTML = '<div class="loader">Cargando grupos...</div>';
    const { data, error } = await db.from('grupos').select('*').eq('tipo', 'tareas').order('created_at', { ascending: false });
    if (error) { cont.innerHTML = `<div class="alert alert-error">Error: ${error.message}<br>¿Ejecutaste el SQL de configuración? Ver README.</div>`; return; }
    if (!data?.length) {
        cont.innerHTML = `<div class="empty"><span class="empty-icon"><i data-icon="check-circle" data-size="40"></i></span>Sin grupos todavía.<br>Creá uno para empezar (ej: "Casa", "Oficina").</div>`;
        return;
    }
    cont.innerHTML = data.map(g => `
        <div class="card" style="overflow:visible">
            <div class="card-body flex-between" style="gap:10px">
                <div class="card-click" style="flex:1;min-width:0" onclick='abrirGrupo(${JSON.stringify(g)})'>
                    <div style="font-weight:700;font-size:16px">${escapeHtml(g.nombre)}</div>
                    <div class="text-muted">${new Date(g.created_at).toLocaleDateString('es-AR', { day:'2-digit', month:'short', year:'numeric' })}</div>
                </div>
                <div style="display:flex;gap:8px;align-items:center">
                    <button class="btn btn-ghost btn-sm" onclick="editarGrupo(${g.id})" title="Editar grupo">${icon('pencil-square',16)}</button>
                    <button class="btn btn-danger btn-sm" onclick="eliminarGrupo(${g.id}, '${g.nombre.replace(/'/g,"\\'")}')" title="Eliminar grupo">${icon('trash',16)}</button>
                </div>
            </div>
        </div>
    `).join('');
}

async function crearGrupo() {
    if (!window._gm_tareas) window._gm_tareas = crearGestorDeGrupos({ table: 'grupos', nameField: 'nombre', rpcCreate: 'crear_grupo_tareas' });
    await window._gm_tareas.crearGrupo();
}

async function eliminarGrupo(id, nombre) {
    if (!confirm(`¿Eliminar el grupo "${nombre}"?\nSe borrarán sus tareas y personas.`)) return;
    const { error: et } = await db.from('tareas').delete().eq('id_grupo', id);
    if (et) { alert('Error al borrar tareas: ' + et.message); return; }
    const { error: ep } = await db.from('participantes').delete().eq('id_grupo', id);
    if (ep) { alert('Error al borrar personas: ' + ep.message); return; }
    const { error: eg } = await db.from('grupos').delete().eq('id', id);
    if (eg) { alert('Error al borrar grupo: ' + eg.message); return; }
    cargarGrupos();
}

// =============================================
// PERSONAS DEL GRUPO DE TAREAS (propias, no comparten con Gastos)
// =============================================
async function cargarPersonasTareas() {
    const { data, error } = await db.from('participantes')
        .select('*').eq('id_grupo', grupoActual.id).order('nombre');
    personasTareas = data || [];
    const cont = document.getElementById('lista-personas-tareas');
    if (error) { cont.innerHTML = `<div class="alert alert-error">${error.message}</div>`; return; }
    if (!data?.length) {
        cont.innerHTML = `<div class="empty"><span class="empty-icon"><i data-icon="users" data-size="40"></i></span>Sin personas todavía en este grupo.</div>`;
    } else {
        cont.innerHTML = `<div class="card">${data.map(p => `
            <div class="part-item">
                <div class="avatar">${p.nombre.charAt(0).toUpperCase()}</div>
                <div style="flex:1;min-width:0">
                    <div class="part-name">${escapeHtml(p.nombre)}</div>
                    ${p.email ? `<div class="text-muted" style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><i data-icon="envelope" data-size="14"></i> ${escapeHtml(p.email)}</div>` : ''}
                </div>
                ${p.email ? '<span class="badge badge-green" style="font-size:11px">Invitado</span>' : ''}
                <button onclick="borrarPersonaTarea(${p.id})" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:4px"><i data-icon="x-mark" data-size="14"></i></button>
            </div>
        `).join('')}</div>`;
    }
    renderSelectAsignado();
}

function renderSelectAsignado() {
    const sel = document.getElementById('input-asignado-tarea');
    let actual = sel.value;

    if (!actual && userEmail) {
        const miPersona = personasTareas.find(p => p.email && p.email.toLowerCase() === userEmail);
        if (miPersona) {
            actual = miPersona.id;
        }
    }

    sel.innerHTML = '<option value="">Sin asignar</option>' +
        personasTareas.map(p => `<option value="${p.id}">${escapeHtml(p.nombre)}</option>`).join('');
    sel.value = actual;

    actualizarCheckboxesPorAsignado();
}

function actualizarCheckboxesPorAsignado() {
    const asignadoVal = document.getElementById('input-asignado-tarea').value;
    const asignadoId = asignadoVal ? parseInt(asignadoVal) : null;
    document.querySelectorAll('.calendar-invite-chk').forEach(chk => {
        const pId = parseInt(chk.getAttribute('data-persona-id'));
        if (pId === asignadoId) {
            chk.checked = true;
        }
    });
}

function actualizarSeccionCalendario() {
    const fechaVal = document.getElementById('input-fecha-tarea').value;
    const div = document.getElementById('section-calendar-invites');
    if (fechaVal) {
        div.style.display = 'block';
        renderCalendarInvitesList();
    } else {
        div.style.display = 'none';
    }
}

function renderCalendarInvitesList() {
    const listCont = document.getElementById('calendar-invites-list');
    if (!listCont) return;

    const conEmail = personasTareas.filter(p => p.email && p.email.trim().length > 0);
    if (!conEmail.length) {
        listCont.innerHTML = '<div style="font-size:12px;color:var(--muted)">Sin participantes con email para invitar.</div>';
        return;
    }

    const asignadoVal = document.getElementById('input-asignado-tarea').value;
    const asignadoId = asignadoVal ? parseInt(asignadoVal) : null;

    listCont.innerHTML = conEmail.map(p => {
        const isAsignado = p.id === asignadoId;
        return `
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);text-transform:none;font-weight:normal;cursor:pointer;margin-bottom:0">
                <input type="checkbox" class="calendar-invite-chk" value="${escapeHtml(p.email)}" data-persona-id="${p.id}" ${isAsignado ? 'checked' : ''} style="width:auto;margin:0;cursor:pointer;" />
                <span>${escapeHtml(p.nombre)} (${escapeHtml(p.email)})</span>
            </label>
        `;
    }).join('');
}

async function agregarPersonaTarea() {
    if (!window._pm_tareas) window._pm_tareas = crearGestorDePersonas({ table: 'participantes', nameField: 'nombre', groupField: 'id_grupo', inputNameId: 'input-nueva-persona', inputEmailId: 'input-email-persona', inviteInfoId: 'invite-info-tareas', addButtonSelector: '#tab-personas .btn-primary', currentListVar: 'personasTareas', redirectParam: 'invite_tarea' });
    await window._pm_tareas.agregarPersona(grupoActual.id);
}

async function borrarPersonaTarea(id) {
    if (!confirm('¿Eliminar esta persona? Las tareas asignadas quedarán sin asignar.')) return;
    const { error } = await db.from('participantes').delete().eq('id', id);
    if (error) { alert('Error: ' + error.message); return; }
    cargarPersonasTareas();
    cargarTareas();
}

// =============================================
// LISTAS DISPONIBLES (globales, para vincular una tarea con una lista de compras)
// =============================================
async function cargarListasDisponibles() {
    const { data, error } = await db.from('listas').select('*').order('nombre');
    if (error) { console.error(error); return; }
    listasDisponibles = data || [];
    const sel = document.getElementById('input-lista-tarea');
    if (!sel) return;
    const actual = sel.value;
    sel.innerHTML = '<option value="">Ninguna</option>' +
        listasDisponibles.map(l => `<option value="${l.id}">${escapeHtml(l.nombre)}</option>`).join('');
    sel.value = actual;
}

function nombreLista(id) {
    if (!id) return null;
    return listasDisponibles.find(l => l.id === id)?.nombre || null;
}

// =============================================
// TAREAS (escopeadas al grupo de tareas actual)
// =============================================
function setFiltro(f) {
    filtroTareas = f;
    document.querySelectorAll('.filter-tab').forEach((t, i) => {
        t.classList.toggle('active', ['pendientes','todas','hechas'][i] === f);
    });
    if (grupoActual) setQueryParam('filtro', f);
    renderTareas();
}

async function cargarTareas() {
    const cont = document.getElementById('tareas-items');
    cont.innerHTML = '<div class="loader">Cargando tareas...</div>';
    const { data, error } = await db.from('tareas')
        .select('*').eq('id_grupo', grupoActual.id)
        .order('hecha').order('created_at', { ascending: false });
    if (error) { cont.innerHTML = `<div class="alert alert-error">Error: ${error.message}<br>¿Ejecutaste el SQL de configuración? Ver README.</div>`; return; }
    todasLasTareas = data || [];
    renderTareas();
}

function nombreAsignado(id) {
    if (!id) return null;
    return personasTareas.find(p => p.id === id)?.nombre || null;
}

function renderTareas() {
    const cont = document.getElementById('tareas-items');
    const pendientes = todasLasTareas.filter(t => !t.hecha);
    const hechas     = todasLasTareas.filter(t => t.hecha);

    let items;
    if (filtroTareas === 'pendientes') items = pendientes;
    else if (filtroTareas === 'hechas') items = hechas;
    else items = [...pendientes, ...hechas];

    document.getElementById('tareas-stats').innerHTML =
        `<span>${pendientes.length} pendiente${pendientes.length !== 1 ? 's' : ''}</span>
         <span>${hechas.length} hecha${hechas.length !== 1 ? 's' : ''}</span>`;

    document.getElementById('btn-borrar-hechas').style.display =
        hechas.length > 0 ? 'flex' : 'none';

    if (!items.length) {
        const msgs = { pendientes: '<i data-icon="check-circle" data-size="18"></i> No hay tareas pendientes.', hechas: 'Sin tareas hechas todavía.', todas: '<i data-icon="clipboard-document-list" data-size="18"></i> No hay tareas en este grupo. Agregá una.' };
        cont.innerHTML = `<div class="empty" style="padding:24px"><span class="empty-icon">${filtroTareas === 'pendientes' ? icon('check-circle',40) : icon('clipboard-document-list',40)}</span>${msgs[filtroTareas]}</div>`;
        return;
    }

    cont.innerHTML = items.map(t => {
        const asignado = nombreAsignado(t.id_asignado);
        const lista = nombreLista(t.id_lista);
        const tieneBadges = t.fecha_vencimiento || lista || asignado;
        return `
        <div class="tarea-item ${t.hecha ? 'comprado' : ''}" id="tarea-${t.id}">
            <div class="tarea-item-main">
                <div class="lista-check ${t.hecha ? 'checked' : ''}" onclick="toggleTarea(${t.id}, ${t.hecha})">
                    ${t.hecha ? icon('check',14) : ''}
                </div>
                <div class="prio-dot prio-${t.prioridad || 'media'}" title="Prioridad ${PRIO_LABEL[t.prioridad] || 'Media'}"></div>
                <div class="lista-nombre ${t.hecha ? 'tachado' : ''}">${escapeHtml(t.titulo)}</div>
                <button onclick="borrarTarea(${t.id})" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:4px;flex-shrink:0"><i data-icon="x-mark" data-size="14"></i></button>
            </div>
            ${tieneBadges ? `
            <div class="tarea-item-badges">
                ${t.fecha_vencimiento ? `<span class="badge badge-purple" title="${t.google_event_id ? 'Sincronizada con Google Calendar' : 'Vencimiento'}"><i data-icon="calendar-days" data-size="14"></i> ${formatFechaHora(t.fecha_vencimiento)}</span>` : ''}
                ${lista ? `<a href="listas.html?abrir=${t.id_lista}" class="badge badge-green" style="text-decoration:none"><i data-icon="shopping-cart" data-size="14"></i> ${escapeHtml(lista)}</a>` : ''}
                ${asignado ? `<span class="badge badge-blue">${escapeHtml(asignado)}</span>` : ''}
            </div>` : ''}
        </div>`;
    }).join('');
}

async function agregarTarea() {
    const titulo = document.getElementById('input-titulo-tarea').value.trim();
    const prioridad = document.getElementById('input-prioridad-tarea').value;
    const asignadoVal = document.getElementById('input-asignado-tarea').value;
    const listaVal = document.getElementById('input-lista-tarea').value;
    const fechaVal = document.getElementById('input-fecha-tarea').value; // "YYYY-MM-DDTHH:mm" en hora local, o ""
    const id_asignado = asignadoVal ? parseInt(asignadoVal) : null;
    const id_lista = listaVal ? parseInt(listaVal) : null;
    const fecha_vencimiento = fechaVal ? new Date(fechaVal).toISOString() : null;
    if (!titulo) { document.getElementById('input-titulo-tarea').focus(); return; }

    const { data, error } = await db.from('tareas')
        .insert({ titulo, prioridad, id_asignado, id_lista, id_grupo: grupoActual.id, fecha_vencimiento }).select().single();
    if (error) { alert('Error: ' + error.message); return; }

    const invitadosEmails = [];
    if (fecha_vencimiento) {
        document.querySelectorAll('.calendar-invite-chk:checked').forEach(chk => {
            invitadosEmails.push(chk.value);
        });
    }

    document.getElementById('input-titulo-tarea').value = '';
    document.getElementById('input-fecha-tarea').value = '';
    document.getElementById('input-asignado-tarea').value = '';
    document.getElementById('input-prioridad-tarea').value = 'media';
    renderSelectAsignado();
    actualizarSeccionCalendario();
    document.getElementById('input-titulo-tarea').focus();

    todasLasTareas = [data, ...todasLasTareas];
    todasLasTareas.sort((a, b) => a.hecha - b.hecha || new Date(b.created_at) - new Date(a.created_at));
    renderTareas();

    if (fecha_vencimiento) {
        try {
            const asignadoEmail = personasTareas.find(p => p.id === id_asignado)?.email || null;
            const resultado = await callCalendarSync({
                action: 'create',
                titulo,
                fecha_vencimiento,
                asignado_email: asignadoEmail,
                invitados_emails: invitadosEmails
            });
            await db.from('tareas').update({ google_event_id: resultado.event_id }).eq('id', data.id);
            const t = todasLasTareas.find(x => x.id === data.id);
            if (t) t.google_event_id = resultado.event_id;
            renderTareas();
        } catch (e) {
            alert('La tarea se creó, pero no se pudo agregar a Google Calendar: ' + e.message);
        }
    }
}

async function toggleTarea(id, estaHecha) {
    const nuevoEstado = !estaHecha;
    const { error } = await db.from('tareas').update({
        hecha: nuevoEstado,
        hecha_at: nuevoEstado ? new Date().toISOString() : null
    }).eq('id', id);
    if (error) { alert('Error: ' + error.message); return; }
    const tarea = todasLasTareas.find(t => t.id === id);
    if (tarea) { tarea.hecha = nuevoEstado; tarea.hecha_at = nuevoEstado ? new Date().toISOString() : null; }
    renderTareas();
}

async function borrarTarea(id) {
    const tarea = todasLasTareas.find(t => t.id === id);
    if (tarea?.google_event_id) {
        try {
            await callCalendarSync({ action: 'delete', event_id: tarea.google_event_id });
        } catch (e) {
            console.error('No se pudo borrar el evento de Google Calendar:', e.message);
        }
    }
    const { error } = await db.from('tareas').delete().eq('id', id);
    if (error) { alert('Error: ' + error.message); return; }
    todasLasTareas = todasLasTareas.filter(t => t.id !== id);
    renderTareas();
}

async function borrarHechas() {
    if (!confirm('¿Borrar todas las tareas hechas de este grupo?')) return;
    const ids = todasLasTareas.filter(t => t.hecha).map(t => t.id);
    const { error } = await db.from('tareas').delete().in('id', ids);
    if (error) { alert('Error: ' + error.message); return; }
    todasLasTareas = todasLasTareas.filter(t => !t.hecha);
    renderTareas();
}
</script>
